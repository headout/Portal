# Local dev: API + MinIO (S3-compatible object storage). The GPU worker is NOT here —
# it runs on RunPod Serverless. For local pipeline testing use a RunPod Pod.
name: portal-dev

services:
  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio-data:/data

  createbucket:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      mc mb -p local/portal;
      mc anonymous set download local/portal;
      exit 0;"

  # The API isn't containerised here — run it locally against MinIO:
  #   cd api && pip install -r requirements.txt && \
  #   S3_ENDPOINT=http://localhost:9000 S3_BUCKET=portal S3_KEY=minioadmin \
  #   S3_SECRET=minioadmin S3_REGION=us-east-1 uvicorn main:app --reload

volumes:
  minio-data:
